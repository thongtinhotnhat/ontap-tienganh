<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Phrases Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e13;
    --card: #16161f;
    --border: #2a2a38;
    --accent: #f5c542;
    --accent2: #5b8fff;
    --green: #3ecf8e;
    --red: #ff5c72;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }

  /* Background noise texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 680px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 36px;
    padding-top: 12px;
  }

  .header .tag {
    display: inline-block;
    background: rgba(245, 197, 66, 0.12);
    color: var(--accent);
    border: 1px solid rgba(245, 197, 66, 0.3);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 16px;
  }

  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
  }

  .header h1 span {
    color: var(--accent);
  }

  .header p {
    color: var(--muted);
    margin-top: 10px;
    font-size: 14px;
  }

  /* Mode selector */
  .mode-selector {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px;
  }

  .mode-btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    background: transparent;
    color: var(--muted);
  }

  .mode-btn.active {
    background: var(--accent);
    color: #0e0e13;
  }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 20px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 13px;
  }

  .progress-info .q-count {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
  }

  .score-badge {
    background: rgba(91, 143, 255, 0.15);
    border: 1px solid rgba(91, 143, 255, 0.3);
    color: var(--accent2);
    padding: 3px 12px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
  }

  .progress-bar {
    height: 5px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 100px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Question card */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 28px 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .q-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }

  .q-type {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 14px;
    font-weight: 500;
  }

  .q-text {
    font-family: 'Syne', sans-serif;
    font-size: clamp(18px, 4vw, 24px);
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -0.3px;
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
  }

  .option:hover:not(.disabled) {
    border-color: var(--accent2);
    background: rgba(91, 143, 255, 0.06);
    transform: translateX(3px);
  }

  .option-letter {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
    transition: all 0.18s;
    color: var(--muted);
  }

  .option-text {
    font-size: 15px;
    line-height: 1.4;
  }

  .option.correct {
    border-color: var(--green);
    background: rgba(62, 207, 142, 0.08);
    animation: pulse-green 0.4s ease;
  }

  .option.correct .option-letter {
    background: var(--green);
    border-color: var(--green);
    color: #0e0e13;
  }

  .option.wrong {
    border-color: var(--red);
    background: rgba(255, 92, 114, 0.08);
    animation: shake 0.4s ease;
  }

  .option.wrong .option-letter {
    background: var(--red);
    border-color: var(--red);
    color: white;
  }

  .option.disabled {
    cursor: not-allowed;
    opacity: 0.55;
  }

  .option.correct.disabled, .option.wrong.disabled {
    opacity: 1;
  }

  /* Result indicator */
  .result-indicator {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 13px 18px;
    border-radius: var(--radius);
    margin-bottom: 14px;
    font-size: 14px;
    font-weight: 500;
    animation: slide-up 0.25s ease;
  }

  .result-indicator.show { display: flex; }

  .result-indicator.correct-msg {
    background: rgba(62, 207, 142, 0.1);
    border: 1px solid rgba(62, 207, 142, 0.3);
    color: var(--green);
  }

  .result-indicator.wrong-msg {
    background: rgba(255, 92, 114, 0.1);
    border: 1px solid rgba(255, 92, 114, 0.3);
    color: var(--red);
  }

  .result-indicator .icon { font-size: 18px; }

  /* Next button */
  .next-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #0e0e13;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    display: none;
    transition: all 0.18s;
    letter-spacing: 0.3px;
  }

  .next-btn:hover { background: #f7d060; transform: translateY(-1px); }
  .next-btn.show { display: block; animation: slide-up 0.2s ease; }

  /* Results screen */
  .results-screen {
    display: none;
    text-align: center;
    animation: slide-up 0.3s ease;
  }

  .results-screen.show { display: block; }

  .results-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 32px;
    position: relative;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .results-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent2), var(--accent), var(--green));
  }

  .results-icon {
    font-size: 56px;
    margin-bottom: 16px;
    display: block;
  }

  .results-title {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }

  .results-subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 32px;
  }

  .score-ring-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 32px;
  }

  .score-ring {
    width: 140px;
    height: 140px;
    position: relative;
  }

  .score-ring svg {
    transform: rotate(-90deg);
    width: 140px;
    height: 140px;
  }

  .score-ring .track {
    fill: none;
    stroke: var(--border);
    stroke-width: 10;
  }

  .score-ring .fill {
    fill: none;
    stroke-width: 10;
    stroke-linecap: round;
    stroke-dasharray: 377;
    stroke-dashoffset: 377;
    transition: stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1);
  }

  .score-ring .fill.high { stroke: var(--green); }
  .score-ring .fill.mid { stroke: var(--accent); }
  .score-ring .fill.low { stroke: var(--red); }

  .score-number {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .score-number .num {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
  }

  .score-number .denom {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .stats-row {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-box {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 12px;
  }

  .stat-box .val {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
  }

  .stat-box .lbl {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .stat-box.g .val { color: var(--green); }
  .stat-box.r .val { color: var(--red); }

  .action-btns {
    display: flex;
    gap: 10px;
  }

  .btn-replay {
    flex: 1;
    padding: 15px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #0e0e13;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.18s;
  }

  .btn-replay:hover { background: #f7d060; transform: translateY(-1px); }

  .btn-review {
    flex: 1;
    padding: 15px;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.18s;
  }

  .btn-review:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Review screen */
  .review-screen {
    display: none;
    animation: slide-up 0.3s ease;
  }

  .review-screen.show { display: block; }

  .review-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }

  .back-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.18s;
  }

  .back-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .review-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
  }

  .review-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 10px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .review-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
  }

  .review-dot.c { background: rgba(62,207,142,0.15); color: var(--green); border: 1px solid var(--green); }
  .review-dot.w { background: rgba(255,92,114,0.15); color: var(--red); border: 1px solid var(--red); }

  .review-content .phrase {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 4px;
  }

  .review-content .meaning {
    font-size: 13px;
    color: var(--muted);
  }

  .review-content .your-ans {
    font-size: 12px;
    margin-top: 5px;
    color: var(--red);
  }

  /* Animations */
  @keyframes slide-up {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse-green {
    0% { box-shadow: 0 0 0 0 rgba(62,207,142,0.4); }
    70% { box-shadow: 0 0 0 10px rgba(62,207,142,0); }
    100% { box-shadow: 0 0 0 0 rgba(62,207,142,0); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .quiz-area { animation: slide-up 0.3s ease; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="tag">✦ English Phrases</div>
    <h1>Ôn tập <span>Tiếng Anh</span></h1>
    <p>Chọn nghĩa đúng của cụm từ/câu tiếng Anh</p>
  </div>

  <!-- Mode selector -->
  <div class="mode-selector">
    <button class="mode-btn active" onclick="setMode('en-vi')">🇺🇸 Anh → Việt</button>
    <button class="mode-btn" onclick="setMode('vi-en')">🇻🇳 Việt → Anh</button>
  </div>

  <!-- Quiz area -->
  <div id="quiz-area" class="quiz-area">
    <div class="progress-wrap">
      <div class="progress-info">
        <span class="q-count" id="q-count">Câu 1 / 10</span>
        <span class="score-badge" id="score-badge">✓ 0 đúng</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="q-card">
      <div class="q-type" id="q-type">CHỌN NGHĨA ĐÚNG</div>
      <div class="q-text" id="q-text">Loading...</div>
    </div>

    <div id="result-indicator" class="result-indicator">
      <span class="icon" id="result-icon"></span>
      <span id="result-text"></span>
    </div>

    <div class="options" id="options"></div>

    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Câu tiếp theo →</button>
  </div>

  <!-- Results screen -->
  <div id="results-screen" class="results-screen">
    <div class="results-card">
      <span class="results-icon" id="results-icon">🎉</span>
      <div class="results-title" id="results-title">Hoàn thành!</div>
      <div class="results-subtitle" id="results-subtitle">Kết quả bài kiểm tra của bạn</div>

      <div class="score-ring-wrap">
        <div class="score-ring">
          <svg viewBox="0 0 140 140">
            <circle class="track" cx="70" cy="70" r="60"/>
            <circle class="fill" id="ring-fill" cx="70" cy="70" r="60"/>
          </svg>
          <div class="score-number">
            <span class="num" id="final-score">0</span>
            <span class="denom" id="final-total">/ 10</span>
          </div>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-box g">
          <div class="val" id="stat-correct">0</div>
          <div class="lbl">✓ Đúng</div>
        </div>
        <div class="stat-box r">
          <div class="val" id="stat-wrong">0</div>
          <div class="lbl">✗ Sai</div>
        </div>
        <div class="stat-box">
          <div class="val" id="stat-pct">0%</div>
          <div class="lbl">Độ chính xác</div>
        </div>
      </div>

      <div class="action-btns">
        <button class="btn-replay" onclick="replay()">↺ Chơi lại</button>
        <button class="btn-review" onclick="showReview()">📋 Xem lại</button>
      </div>
    </div>
  </div>

  <!-- Review screen -->
  <div id="review-screen" class="review-screen">
    <div class="review-header">
      <button class="back-btn" onclick="backToResults()">← Quay lại</button>
      <div class="review-title">Chi tiết câu trả lời</div>
    </div>
    <div id="review-list"></div>
  </div>
</div>

<script>
const ALL_PHRASES = [

  ["See you around.", "Hẹn gặp lại loanh quanh đâu đây."],
  ["I'm off.", "Tôi đi đây."],
  ["Safe travels!", "Thượng lộ bình an!"],

const LETTERS = ['A','B','C','D'];
const Q_PER_ROUND = 10;

let mode = 'en-vi';
let questions = [];
let current = 0;
let score = 0;
let answered = false;
let history = []; // {phrase, correct_meaning, user_answer, is_correct}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && m==='en-vi') || (i===1 && m==='vi-en'));
  });
  replay();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildQuestions() {
  const pool = shuffle(ALL_PHRASES).slice(0, Q_PER_ROUND);
  return pool.map((item, idx) => {
    const correct = item;
    // pick 3 wrong answers from the rest
    const others = ALL_PHRASES.filter(x => x !== item);
    const wrongs = shuffle(others).slice(0, 3);
    const allOpts = shuffle([correct, ...wrongs]);
    return { correct, options: allOpts };
  });
}

function startQuiz() {
  questions = buildQuestions();
  current = 0;
  score = 0;
  answered = false;
  history = [];

  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('results-screen').classList.remove('show');
  document.getElementById('review-screen').classList.remove('show');

  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[current];
  const total = questions.length;

  document.getElementById('q-count').textContent = `Câu ${current+1} / ${total}`;
  document.getElementById('score-badge').textContent = `✓ ${score} đúng`;
  document.getElementById('progress-fill').style.width = `${(current/total)*100}%`;

  const isEnVi = mode === 'en-vi';
  document.getElementById('q-type').textContent = isEnVi ? 'NGHĨA TIẾNG VIỆT LÀ?' : 'CỤM TỪ TIẾNG ANH LÀ?';
  document.getElementById('q-text').textContent = isEnVi ? q.correct[0] : q.correct[1];

  const ri = document.getElementById('result-indicator');
  ri.className = 'result-indicator';

  const nb = document.getElementById('next-btn');
  nb.classList.remove('show');
  nb.textContent = current < questions.length-1 ? 'Câu tiếp theo →' : 'Xem kết quả →';

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach((opt, i) => {
    const el = document.createElement('div');
    el.className = 'option';
    el.innerHTML = `
      <div class="option-letter">${LETTERS[i]}</div>
      <div class="option-text">${isEnVi ? opt[1] : opt[0]}</div>
    `;
    el.onclick = () => selectAnswer(el, opt, q);
    opts.appendChild(el);
  });
}

function selectAnswer(el, chosen, q) {
  if (answered) return;
  answered = true;

  const isCorrect = chosen === q.correct;
  const allOpts = document.querySelectorAll('.option');
  const isEnVi = mode === 'en-vi';

  allOpts.forEach((opt, i) => {
    const optData = q.options[i];
    opt.classList.add('disabled');
    if (optData === q.correct) {
      opt.classList.add('correct');
    }
  });

  if (!isCorrect) {
    el.classList.add('wrong');
    el.classList.remove('correct');
  } else {
    score++;
    document.getElementById('score-badge').textContent = `✓ ${score} đúng`;
  }

  // Show result indicator
  const ri = document.getElementById('result-indicator');
  const icon = document.getElementById('result-icon');
  const txt = document.getElementById('result-text');

  if (isCorrect) {
    ri.className = 'result-indicator correct-msg show';
    icon.textContent = '✓';
    txt.textContent = 'Chính xác!';
  } else {
    ri.className = 'result-indicator wrong-msg show';
    icon.textContent = '✗';
    const correctAnswer = isEnVi ? q.correct[1] : q.correct[0];
    txt.textContent = `Sai rồi! Đáp án đúng: "${correctAnswer}"`;
  }

  history.push({
    phrase: q.correct[0],
    meaning: q.correct[1],
    user_answer: isEnVi ? chosen[1] : chosen[0],
    is_correct: isCorrect
  });

  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResults();
  } else {
    document.getElementById('quiz-area').innerHTML = document.getElementById('quiz-area').innerHTML;
    // re-render by rebuilding DOM sections manually
    renderQuestion();
    // re-attach next btn
    document.getElementById('next-btn').onclick = nextQuestion;
  }
}

function showResults() {
  document.getElementById('quiz-area').style.display = 'none';
  const rs = document.getElementById('results-screen');
  rs.classList.add('show');

  const total = questions.length;
  const pct = Math.round((score/total)*100);

  let emoji = pct >= 80 ? '🎉' : pct >= 50 ? '🙂' : '😅';
  let title = pct >= 80 ? 'Xuất sắc!' : pct >= 50 ? 'Không tệ!' : 'Cần cố gắng thêm!';

  document.getElementById('results-icon').textContent = emoji;
  document.getElementById('results-title').textContent = title;
  document.getElementById('results-subtitle').textContent = `Bạn trả lời đúng ${score}/${total} câu`;
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-total').textContent = `/ ${total}`;
  document.getElementById('stat-correct').textContent = score;
  document.getElementById('stat-wrong').textContent = total - score;
  document.getElementById('stat-pct').textContent = pct + '%';

  // Animate ring
  const fill = document.getElementById('ring-fill');
  fill.className = 'fill ' + (pct >= 70 ? 'high' : pct >= 40 ? 'mid' : 'low');
  const circumference = 377;
  const offset = circumference - (pct/100)*circumference;
  setTimeout(() => { fill.style.strokeDashoffset = offset; }, 100);
}

function replay() {
  document.getElementById('quiz-area').style.display = 'block';
  // rebuild inner html to reset
  const qa = document.getElementById('quiz-area');
  qa.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-info">
        <span class="q-count" id="q-count">Câu 1 / 10</span>
        <span class="score-badge" id="score-badge">✓ 0 đúng</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="q-card">
      <div class="q-type" id="q-type">CHỌN NGHĨA ĐÚNG</div>
      <div class="q-text" id="q-text">Loading...</div>
    </div>
    <div id="result-indicator" class="result-indicator">
      <span class="icon" id="result-icon"></span>
      <span id="result-text"></span>
    </div>
    <div class="options" id="options"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Câu tiếp theo →</button>
  `;
  document.getElementById('results-screen').classList.remove('show');
  document.getElementById('review-screen').classList.remove('show');
  startQuiz();
}

function showReview() {
  document.getElementById('results-screen').classList.remove('show');
  const rv = document.getElementById('review-screen');
  rv.classList.add('show');

  const list = document.getElementById('review-list');
  list.innerHTML = '';
  history.forEach(h => {
    const el = document.createElement('div');
    el.className = 'review-item';
    el.innerHTML = `
      <div class="review-dot ${h.is_correct ? 'c' : 'w'}">${h.is_correct ? '✓' : '✗'}</div>
      <div class="review-content">
        <div class="phrase">${h.phrase}</div>
        <div class="meaning">${h.meaning}</div>
        ${!h.is_correct ? `<div class="your-ans">Bạn chọn: "${h.user_answer}"</div>` : ''}
      </div>
    `;
    list.appendChild(el);
  });
}

function backToResults() {
  document.getElementById('review-screen').classList.remove('show');
  document.getElementById('results-screen').classList.add('show');
}

// Init
startQuiz();
</script>
